<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunucu Görünümü — Hedefim LGS</title>
<style>
  :root{
    --ink:#1c1926; --ink-soft:#6b6478; --paper:#faf8f5; --card:#ffffff;
    --line:#e8e3da; --violet-1:#7c3aed; --violet-soft:#f1ebfd;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#f1eef7; --ink-soft:#a99fc0; --paper:#15121e; --card:#1e1a2b;
      --line:#332d45; --violet-1:#9b6bf2; --violet-soft:#241b3d;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    display:flex; flex-direction:column; height:100vh; padding:18px; gap:14px;
  }
  .topbar{display:flex; align-items:center; justify-content:space-between;}
  .counter{
    font-variant-numeric:tabular-nums; font-size:.78rem; font-weight:700; color:var(--violet-1);
    background:var(--violet-soft); padding:6px 14px; border-radius:100px;
  }
  .timer{font-variant-numeric:tabular-nums; font-size:1rem; font-weight:700; color:var(--ink-soft);}
  .disconnected{
    font-size:.78rem; color:#dc2626; background:#fee2e2; padding:6px 12px; border-radius:100px; display:none;
  }
  .current-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:22px; flex:1; overflow-y:auto; display:flex; flex-direction:column;
  }
  .current-card h1{font-size:1.15rem; margin:0 0 14px; line-height:1.3;}
  .notes{font-size:1.02rem; line-height:1.6; color:var(--ink); flex:1;}
  .notes:empty::before{content:"Bu slayt için not eklenmemiş."; color:var(--ink-soft); font-style:italic;}
  .notes p{margin:0 0 12px;}
  .notes p.tip{background:var(--violet-soft); border-radius:10px; padding:10px 13px; color:var(--ink);}
  .notes p.q{font-weight:700; color:var(--ink); margin-bottom:2px;}
  .notes p.a{color:#1f8a5f; padding-left:2px;}
  .notes p.plain{white-space:pre-wrap;}
  .next-card{
    background:var(--violet-soft); border-radius:14px; padding:14px 16px;
  }
  .next-card .label{font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--violet-1); margin-bottom:4px;}
  .next-card .title{font-size:.92rem; font-weight:700; color:var(--ink);}
  .controls{display:flex; gap:10px;}
  .controls button{
    flex:1; padding:13px; border:none; border-radius:10px; font-size:.88rem; font-weight:700;
    cursor:pointer; background:var(--violet-1); color:#fff;
  }
  .controls button:disabled{opacity:.35; cursor:default;}
  .controls button.secondary{background:var(--card); border:1px solid var(--line); color:var(--ink);}

  .roi-btn{
    font-size:.72rem; font-weight:700; color:var(--violet-1); background:var(--violet-soft);
    border:none; padding:6px 12px; border-radius:100px; cursor:pointer;
  }

  .roi-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .roi-overlay.show{display:flex;}
  .roi-modal{
    background:var(--card); border-radius:16px; padding:22px; max-width:380px; width:100%;
    max-height:85vh; overflow-y:auto;
  }
  .roi-modal h2{font-size:1rem; margin:0 0 4px;}
  .roi-modal p.hint{font-size:.76rem; color:var(--ink-soft); margin:0 0 16px;}
  .roi-modal label{display:block; font-size:.76rem; font-weight:700; margin-bottom:5px;}
  .roi-modal input{
    width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:8px;
    font-size:.9rem; margin-bottom:12px; background:var(--paper); color:var(--ink); font-family:inherit;
  }
  .roi-modal .row-btns{display:flex; gap:8px;}
  .roi-modal .row-btns button{
    flex:1; padding:11px; border:none; border-radius:8px; font-weight:700; font-size:.85rem; cursor:pointer;
  }
  .roi-modal .calc{background:var(--violet-1); color:#fff;}
  .roi-modal .close{background:var(--paper); border:1px solid var(--line); color:var(--ink);}
  .roi-result{margin-top:14px; font-size:.88rem; display:none;}
  .roi-result.show{display:block;}
  .roi-result .r-row{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line);}
  .roi-result .r-row:last-child{border-bottom:none; font-weight:700; color:var(--violet-1);}
</style>
</head>
<body>
  <div class="topbar">
    <span class="counter" id="counter">— / —</span>
    <span class="timer" id="timer">00:00</span>
    <button class="roi-btn" id="roiOpenBtn" type="button">🧮 ROI Hesapla</button>
    <span class="disconnected" id="disconnected">⚠ Sunum penceresi bulunamadı</span>
  </div>

  <div class="roi-overlay" id="roiOverlay">
    <div class="roi-modal">
      <h2>🧮 Kurumsal Lisans — Anlık Hesap</h2>
      <p class="hint">Sadece sende görünür. Kurum yetkilisinin verdiği rakamları hızlıca gir.</p>
      <label for="roi-students">Öğrenci sayısı</label>
      <input type="number" id="roi-students" placeholder="Örn: 300" />
      <label for="roi-tuition">Öğrenci başı yıllık ücret (TL)</label>
      <input type="number" id="roi-tuition" placeholder="Örn: 80000" />
      <div class="row-btns">
        <button class="close" id="roiCloseBtn" type="button">Kapat</button>
        <button class="calc" id="roiCalcBtn" type="button">Hesapla</button>
      </div>
      <div class="roi-result" id="roiResult">
        <div class="r-row"><span>Segment</span><span id="roi-r-segment">—</span></div>
        <div class="r-row"><span>Yıllık lisans ücreti</span><span id="roi-r-fee">—</span></div>
        <div class="r-row"><span>Öğrenci karşılığı</span><span id="roi-r-count">—</span></div>
        <div class="r-row"><span>Öğrenci tabanına oranı</span><span id="roi-r-pct">—</span></div>
      </div>
    </div>
  </div>

  <div class="current-card">
    <h1 id="currentTitle">Yükleniyor…</h1>
    <div class="notes" id="currentNotes"></div>
  </div>

  <div class="next-card">
    <div class="label">Sıradaki Slayt</div>
    <div class="title" id="nextTitle">—</div>
  </div>

  <div class="controls">
    <button class="secondary" id="prevBtn">‹ Önceki</button>
    <button id="nextBtn">Sonraki ›</button>
  </div>

<script>
  const opener = window.opener;
  const counterEl = document.getElementById('counter');
  const timerEl = document.getElementById('timer');
  const disconnectedEl = document.getElementById('disconnected');
  const currentTitleEl = document.getElementById('currentTitle');
  const currentNotesEl = document.getElementById('currentNotes');
  const nextTitleEl = document.getElementById('nextTitle');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let lastIndex = -1;
  const startTime = Date.now();

  function formatElapsed(ms) {
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60), s = totalSec % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function tick() {
    timerEl.textContent = formatElapsed(Date.now() - startTime);

    if (!opener || opener.closed || !opener.presenterState) {
      disconnectedEl.style.display = 'inline-block';
      return;
    }
    disconnectedEl.style.display = 'none';

    const { current, total } = opener.presenterState;
    counterEl.textContent = `${current + 1} / ${total}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;

    if (current !== lastIndex) {
      lastIndex = current;
      const info = opener.getSlideInfo(current);
      const nextInfo = opener.getSlideInfo(current + 1);
      currentTitleEl.textContent = info?.title || `Slayt ${current + 1}`;
      renderNotes(info?.notes || '');
      nextTitleEl.textContent = nextInfo ? nextInfo.title : 'Son slayt';
    }
  }

  function renderNotes(text) {
    currentNotesEl.innerHTML = '';
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    lines.forEach(line => {
      const p = document.createElement('p');
      if (line.startsWith('💡')) { p.className = 'tip'; p.textContent = line; }
      else if (line.startsWith('❓')) { p.className = 'q'; p.textContent = line; }
      else if (line.startsWith('✅')) { p.className = 'a'; p.textContent = line; }
      else { p.className = 'plain'; p.textContent = line; }
      currentNotesEl.appendChild(p);
    });
  }

  prevBtn.addEventListener('click', () => { if (opener && !opener.closed) opener.goTo(opener.presenterState.current - 1); });
  nextBtn.addEventListener('click', () => { if (opener && !opener.closed) opener.goTo(opener.presenterState.current + 1); });

  document.addEventListener('keydown', (e) => {
    const tag = (e.target && e.target.tagName || '').toLowerCase();
    if (tag === 'input') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextBtn.click(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevBtn.click(); }
  });

  setInterval(tick, 250);
  tick();

  // ROI hesaplayıcı — sadece bu pencerede, ana sunuma hiç yansımaz
  const LICENSE_TIERS = [
    { max: 250, fee: 600000, label: 'Segment 1 (0–250)' },
    { max: 750, fee: 1350000, label: 'Segment 2 (251–750)' },
    { max: 1500, fee: 2400000, label: 'Segment 3 (751–1.500)' },
    { max: 3000, fee: 4200000, label: 'Segment 4 (1.501–3.000)' },
    { max: 5000, fee: 6500000, label: 'Segment 5 (3.001–5.000)' },
  ];

  const roiOverlay = document.getElementById('roiOverlay');
  document.getElementById('roiOpenBtn').addEventListener('click', () => roiOverlay.classList.add('show'));
  document.getElementById('roiCloseBtn').addEventListener('click', () => roiOverlay.classList.remove('show'));
  roiOverlay.addEventListener('click', (e) => { if (e.target === roiOverlay) roiOverlay.classList.remove('show'); });

  document.getElementById('roiCalcBtn').addEventListener('click', () => {
    const students = parseFloat(document.getElementById('roi-students').value);
    const tuition = parseFloat(document.getElementById('roi-tuition').value);
    const result = document.getElementById('roiResult');
    if (!students || students <= 0 || !tuition || tuition <= 0) {
      alert('Lütfen her iki alanı da doldurun.');
      return;
    }
    const tier = LICENSE_TIERS.find(t => students <= t.max);
    if (!tier) {
      document.getElementById('roi-r-segment').textContent = 'Segment 6 (5.000+)';
      document.getElementById('roi-r-fee').textContent = 'Özel görüşme';
      document.getElementById('roi-r-count').textContent = '—';
      document.getElementById('roi-r-pct').textContent = '—';
      result.classList.add('show');
      return;
    }
    const count = Math.ceil(tier.fee / tuition);
    const pct = Math.round((count / students) * 1000) / 10;
    document.getElementById('roi-r-segment').textContent = tier.label;
    document.getElementById('roi-r-fee').textContent = tier.fee.toLocaleString('tr-TR') + ' TL';
    document.getElementById('roi-r-count').textContent = count + ' öğrenci';
    document.getElementById('roi-r-pct').textContent = '%' + pct;
    result.classList.add('show');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') roiOverlay.classList.remove('show');
  });
</script>
</body>
</html>
